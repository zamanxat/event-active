<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#070b14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Enactus EVENT">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <title>Enactus IITU EVENT</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="telegram-cloud-document-2-5192876380127274476-Photoroom.png">
    <link rel="shortcut icon" href="telegram-cloud-document-2-5192876380127274476-Photoroom.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        *, *::before, *::after { box-sizing: border-box; }
        html { overflow-x: clip; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        /* Қолданба сияқты: екі рет басу/пинч зумды азайту */
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #070b14; color: #e2e8f0; -webkit-tap-highlight-color: transparent; overflow-x: clip; margin: 0; min-height: 100dvh; min-height: -webkit-fill-available; padding-top: env(safe-area-inset-top, 0); overscroll-behavior-y: contain; touch-action: manipulation; }
        @media (max-width: 1024px) {
            html { touch-action: manipulation; }
        }
        img { max-width: 100%; height: auto; vertical-align: middle; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .tab-btn.active { background: #fbbf24; color: #000; box-shadow: 0 10px 20px -5px rgba(251, 191, 36, 0.4); }
        .enactus-gold { color: #fbbf24; }
        .enactus-bg-gold { background-color: #fbbf24; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .color-input::-webkit-color-swatch { border-radius: 0.75rem; border: 2px solid #fbbf24; }
        .color-input { width: 2.5rem; height: 2.5rem; border-radius: 0.75rem; border: 2px solid #fbbf24; flex-shrink: 0; }
        .btn-gold { background: linear-gradient(90deg, #fbbf24 0%, #f59e42 100%); color: #222; font-weight: bold; box-shadow: 0 2px 8px #fbbf2440; }
        .btn-gold:hover { background: linear-gradient(90deg, #f59e42 0%, #fbbf24 100%); }
        .btn-gold:active { transform: scale(0.98); }
        .touch-target { min-width: 44px; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
        .countdown-grid { display: grid; gap: 0.5rem; width: 100%; max-width: 20rem; }
        #meeting-banner .countdown-grid { max-width: 100%; }
        .countdown-grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .countdown-grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .countdown-cell { min-width: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0.5rem 0.25rem; border-radius: 0.5rem; background: rgba(0,0,0,0.22); border: 1px solid rgba(0,0,0,0.28); box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
        .countdown-cell .num { font-variant-numeric: tabular-nums; font-weight: 800; line-height: 1.1; word-break: keep-all; }
        .countdown-day-row { grid-column: 1 / -1; }
        @media (max-width: 640px) {
            #admin-tabs { -webkit-overflow-scrolling: touch; scroll-padding: 0.5rem; }
            .tab-btn { white-space: nowrap; flex-shrink: 0; }
            input[type="text"], input[type="password"], input[type="number"], input[type="datetime-local"], input[type="date"], select, textarea { font-size: 16px !important; }
        }
        #modal-card { max-height: min(90dvh, 100%); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        @media (max-width: 640px) {
            #custom-modal { align-items: flex-end; padding-bottom: env(safe-area-inset-bottom, 0); }
            #modal-card { border-radius: 1.25rem 1.25rem 0 0; width: 100%; max-width: 100%; transform: none !important; }
        }
        .admin-batch-fab {
            bottom: calc(3.25rem + env(safe-area-inset-bottom, 0px));
            right: calc(0.75rem + env(safe-area-inset-right, 0px));
        }
        @media (min-width: 640px) {
            .admin-batch-fab {
                bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
                right: calc(1rem + env(safe-area-inset-right, 0px));
            }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Custom Modal -->
    <div id="custom-modal" class="fixed inset-0 z-[200] flex items-end sm:items-center justify-center p-0 sm:p-6 hidden bg-black/80 backdrop-blur-md opacity-0 transition-opacity duration-300">
        <div class="glass max-w-sm w-full p-5 sm:p-8 rounded-t-2xl sm:rounded-2xl text-center sm:scale-95 sm:transition-transform duration-300 mx-0 sm:mx-4" id="modal-card" onclick="event.stopPropagation()">
            <div id="modal-icon" class="w-14 h-14 sm:w-16 sm:h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 bg-yellow-500/10 text-yellow-500 border border-yellow-500/20"></div>
            <h3 id="modal-title" class="text-lg sm:text-xl font-bold mb-2"></h3>
            <p id="modal-text" class="text-slate-400 text-sm mb-6 leading-relaxed"></p>
            <div class="flex flex-col-reverse sm:flex-row gap-2 sm:gap-3" id="modal-actions"></div>
        </div>
    </div>

    <!-- Навигация -->
    <nav class="sticky top-0 z-50 border-b border-white/5 glass px-3 sm:px-6 py-2.5 sm:py-3 flex justify-between items-center">
        <div class="flex items-center min-w-0">
            <img src="Logo IITU white.png" alt="Logo" class="h-11 sm:h-[3.25rem] max-h-[3rem] sm:max-h-14 max-w-[min(240px,68vw)] w-auto object-contain object-left flex-shrink-0" onerror="this.onerror=null;this.src='telegram-cloud-document-2-5192876380127274476-Photoroom.png'">
        </div>
        <div id="nav-actions" class="flex-shrink-0">
            <button onclick="document.getElementById('admin-auth').classList.remove('hidden')" class="btn-gold px-4 sm:px-5 py-2 rounded-xl font-semibold text-sm flex items-center gap-1.5 touch-target">
                <i data-lucide="lock" class="w-4 h-4"></i> Кіру
            </button>
        </div>
    </nav>

    <!-- Статистика беті -->
    <main id="page-stats" class="container mx-auto px-3 sm:px-4 py-3 sm:py-6 max-w-2xl w-full min-w-0 pb-[env(safe-area-inset-bottom,0px)]">
        <!-- Жиналыс баннері -->
        <div id="meeting-banner" class="mb-4 sm:mb-8 bg-gradient-to-br from-amber-400 via-orange-500 to-orange-600 p-4 sm:p-6 rounded-2xl relative overflow-hidden shadow-xl shadow-orange-500/20 border border-black/10">
            <div class="relative z-10 flex flex-col gap-3 sm:gap-4 text-black">
                <div class="flex items-start gap-3 min-w-0">
                    <div class="flex h-11 w-11 sm:h-12 sm:w-12 shrink-0 items-center justify-center rounded-xl bg-black/18 border border-black/25 shadow-inner" aria-hidden="true">
                        <i data-lucide="clock-4" class="w-5 h-5 sm:w-6 sm:h-6 opacity-95"></i>
                    </div>
                    <div class="min-w-0 flex-1 pt-0.5">
                        <p class="text-xs sm:text-sm font-extrabold tracking-wide opacity-95 leading-tight">Келесі жиналысқа</p>
                        <p id="meeting-date-hint" class="text-[11px] sm:text-xs font-semibold opacity-90 mt-1 leading-snug break-words min-h-[1.25em]"></p>
                    </div>
                </div>
                <div id="meeting-countdown" class="w-full min-w-0"></div>
            </div>
        </div>
        <!-- Қатысушылар және тапсырмалар -->
        <section id="leaderboard" class="space-y-4 sm:space-y-6 pb-28 sm:pb-24"></section>
    </main>

    <!-- Админ беті -->
    <div id="page-admin" class="container mx-auto px-3 sm:px-4 py-4 sm:py-6 max-w-2xl w-full min-w-0 hidden">
        <div class="flex justify-between items-center gap-2 mb-4 sm:mb-6">
            <h2 class="text-lg sm:text-2xl font-bold truncate">Басқару</h2>
            <button onclick="logoutAdmin()" class="p-2.5 sm:p-3 glass text-red-500 rounded-xl hover:bg-red-500/10 transition-colors touch-target flex-shrink-0" title="Шығу">
                <i data-lucide="power" class="w-5 h-5"></i>
            </button>
        </div>
        <div id="admin-tabs" class="flex bg-slate-900/60 p-1.5 sm:p-2 rounded-xl sm:rounded-2xl mb-4 sm:mb-6 border border-white/5 overflow-x-auto gap-1 sm:gap-2 no-scrollbar">
            <button onclick="switchAdminTab('users')" class="tab-btn flex-shrink-0 px-3 sm:px-4 py-2 sm:py-2.5 rounded-lg text-xs font-semibold transition-all">Мүшелер</button>
            <button onclick="switchAdminTab('tasks')" class="tab-btn flex-shrink-0 px-3 sm:px-4 py-2 sm:py-2.5 rounded-lg text-xs font-semibold transition-all">Тапсырмалар</button>
            <button onclick="switchAdminTab('levels')" class="tab-btn flex-shrink-0 px-3 sm:px-4 py-2 sm:py-2.5 rounded-lg text-xs font-semibold transition-all">Деңгейлер</button>
            <button onclick="switchAdminTab('sobrashka')" class="tab-btn flex-shrink-0 px-3 sm:px-4 py-2 sm:py-2.5 rounded-lg text-xs font-semibold transition-all">Жиналыс</button>
            <button onclick="switchAdminTab('settings')" class="tab-btn flex-shrink-0 px-3 sm:px-4 py-2 sm:py-2.5 rounded-lg text-xs font-semibold transition-all">Баптау</button>
            <button onclick="switchAdminTab('history')" class="tab-btn flex-shrink-0 px-3 sm:px-4 py-2 sm:py-2.5 rounded-lg text-xs font-semibold transition-all">Тарих</button>
        </div>
        <div id="admin-content" class="min-h-[50vh] pb-20 sm:pb-24"></div>
    </div>

    <!-- Админ кіру -->
    <div id="admin-auth" class="fixed inset-0 z-[150] glass flex items-center justify-center p-4 sm:p-6 hidden">
        <div class="bg-slate-900 border border-white/10 p-5 sm:p-8 rounded-2xl w-full max-w-sm text-center relative">
            <button onclick="closeAdminAuth()" class="absolute top-3 right-3 p-2 text-slate-400 hover:text-white rounded-lg hover:bg-white/5" title="Жабу"><i data-lucide="x" class="w-5 h-5"></i></button>
            <div class="w-16 h-16 sm:w-20 sm:h-20 enactus-bg-gold rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-yellow-500/20">
                <i data-lucide="shield-check" class="w-8 h-8 sm:w-10 sm:h-10 text-black"></i>
            </div>
            <h3 class="text-xl font-bold mb-6">Кіру</h3>
            <input type="password" id="admin-pass-input" placeholder="Құпия сөзді енгізіңіз" autocomplete="current-password"
                   class="w-full bg-black/40 border border-white/10 rounded-xl p-3 sm:p-4 text-center text-lg outline-none focus:border-yellow-500">
            <div id="admin-auth-info"></div>
            <button onclick="checkAdminPass()" class="w-full enactus-bg-gold text-black py-3 sm:py-4 rounded-xl font-semibold mt-4">Кіру</button>
        </div>
    </div>

    <!-- Тапсырмалар: бірнеше адамға жинақтап сақтау -->
    <button type="button" id="tasks-batch-save-fab" onclick="saveAllPendingTasks()" class="admin-batch-fab hidden fixed z-[130] btn-gold rounded-2xl shadow-xl shadow-yellow-500/25 px-4 sm:px-5 py-3.5 font-bold text-sm sm:text-base touch-target pointer-events-auto max-w-[min(100vw-1.5rem,14rem)]">
        Сақтау
    </button>
    <button type="button" id="sobrashka-batch-save-fab" onclick="saveSobrashkaBatchFabClick()" class="admin-batch-fab hidden fixed z-[130] btn-gold rounded-2xl shadow-xl shadow-yellow-500/25 px-4 sm:px-5 py-3.5 font-bold text-sm sm:text-base touch-target pointer-events-auto max-w-[min(100vw-1.5rem,15rem)]">
        Жалпы сақтау
    </button>

    <div class="fixed bottom-0 left-0 w-full z-50 pointer-events-none" style="padding-bottom: env(safe-area-inset-bottom, 0);">
        <div class="w-full text-center py-2">
            <span class="inline-block bg-black/70 rounded-t-xl px-4 py-1.5 text-yellow-400 text-xs sm:text-sm font-semibold pointer-events-none">
                Event отдел
            </span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
